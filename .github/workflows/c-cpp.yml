name: Kernel Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install arm toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi

    - name: Build tools
      run: make tools
    
    - name: Make rootfs
      run: tools/mkfs ./staging
    - name: Build image
      run: make image

    - name: Verify build artifacts
      run: |
        test -f kernel.elf
        echo "Build succeeded"
